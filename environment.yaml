name: maker-checker-ai
channels:
  - defaults
  - conda-forge

dependencies:
  # Python version
  - python=3.10

  # Core runtime — install via pip (modal ecosystem)
  - pip

  - pip:
    # ── Modal cloud runtime ───────────────────────────────────────
    - modal==1.3.5              # serverless GPU orchestration

    # ── HuggingFace stack (runs inside Modal container image) ────
    - transformers>=4.48.0      # text-generation pipeline
    - torch>=2.3.0              # PyTorch
    - accelerate                # device_map="cuda" support
    - hf_transfer               # fast HF Hub downloads
    - sentencepiece             # tokeniser (Qwen / OLMo)
    - protobuf                  # serialisation for some tokenisers

    # ── Web layer ────────────────────────────────────────────────
    - fastapi[standard]==0.135.1   # FastAPI + uvicorn extras
    - starlette==0.52.1

    # ── HTTP / API clients ───────────────────────────────────────
    - requests==2.31.0          # DeepSeek / Kimi / Gemini REST calls
    - urllib3==1.26.20

    # ── Environment / config ─────────────────────────────────────
    - python-dotenv==1.0.1      # load .env (DEEPSEEK_API_KEY, etc.)
    - PyYAML==6.0.2             # this file's own parser, plus general use

    # ── Data / serialisation ─────────────────────────────────────
    - pydantic==2.12.5          # request/response validation
    - pydantic_core==2.41.5

    # ── Async / concurrency ──────────────────────────────────────
    - anyio==4.12.1
    - websockets==15.0.1

    # ── Utilities ────────────────────────────────────────────────
    - typing_extensions==4.15.0
    - packaging==24.1
    - tqdm==4.66.5

# ─────────────────────────────────────────────────────────────────
# Dev / local tooling (not needed inside the Modal container)
# ─────────────────────────────────────────────────────────────────
# To install only the local dev extras, run:
#   pip install modal python-dotenv requests
# Then authenticate Modal:
#   modal setup
# Then serve / run:
#   modal serve path.py
#   modal run  path.py --prompt "your question"
